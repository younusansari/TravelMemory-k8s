apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: travel-app
  labels:
    app: backend-config
data:
  BACKEND_PORT: "3001"
  FRONTEND_PORT: "3000"
  MONGO_URI: "mongodb://mongo:27017/travelmemory"
  # REACT_APP_BACKEND_URL: "http://localhost:30001" # Use this when running the frontend outside the cluster and accessing the backend via NodePort
  # REACT_APP_BACKEND_URL: "http://backend:3001" # Use the service name "backend" to access the backend from the frontend within the cluster
  REACT_APP_BACKEND_URL: "http://192.168.1.2:30001" # Use the host machine's IP address to access the backend from the frontend when running outside the cluster