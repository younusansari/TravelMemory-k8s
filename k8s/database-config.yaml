apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: travel-app
  labels:
    app: travelmemory
spec:

  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: travel-app
  labels:
    app: travelmemory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travelmemory
  template:
    metadata:
      labels:
        app: travelmemory
    spec:
      containers:
      - name: mongo
        image: mongo:6
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-storage
          mountPath: /data/db
      volumes:
      - name: mongo-storage
        persistentVolumeClaim:
          claimName: mongo-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  labels:
    app: travelmemory
  namespace: travel-app
spec:
  selector:
    app: travelmemory
  ports:
    - port: 27017
      targetPort: 27017

