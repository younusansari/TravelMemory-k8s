apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: travel-app
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: travelmemory-backend:v1.0
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              valueFrom:
               configMapKeyRef:
                 name: backend-config
                 key: BACKEND_PORT
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MONGO_URI

---

apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: travel-app
  labels:
    app: backend
spec:
  type: NodePort

  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30001
      
