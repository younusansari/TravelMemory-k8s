apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: travel-app
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: travelmemory-frontend:v1.0
        ports:
          - containerPort: 3000
        env:
          - name: FRONTEND_PORT
            valueFrom:
              configMapKeyRef:
                name: backend-config
                key: FRONTEND_PORT
          - name: REACT_APP_BACKEND_URL
            valueFrom:
              configMapKeyRef:
                name: backend-config
                key: REACT_APP_BACKEND_URL
          

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: travel-app
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000